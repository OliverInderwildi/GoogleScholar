name: Refresh Google Scholar page

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"   # weekly (Monday)
    - cron: "23 6 1 * *"   # monthly (1st)

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly beautifulsoup4 lxml

      - name: Run script
        run: python refresh_scholar.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scholar-data.json
          git diff --cached --quiet || git commit -m "Auto update Scholar page"
          git push
